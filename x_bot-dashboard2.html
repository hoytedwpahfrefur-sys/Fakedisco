<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Biscord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blurple:#5865F2;
  --blurple-h:#4752C4;
  --bg-1:#1E1F22;
  --bg-2:#2B2D31;
  --bg-3:#313338;
  --bg-4:#35373C;
  --bg-hover:#35373C;
  --text:#DBDEE1;
  --text-muted:#80848E;
  --text-dim:#4E5058;
  --green:#23A559;
  --yellow:#F0B232;
  --grey:#80848E;
  --border:rgba(255,255,255,0.048);
  --rail-w:72px;
  --side-w:240px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-1);font-family:'Noto Sans',sans-serif;color:var(--text);font-size:14px;line-height:1;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}
::-webkit-scrollbar-track{background:transparent;}

/* ══ APP ══ */
.app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* ══ SERVER RAIL ══ */
.rail{
  width:var(--rail-w);flex-shrink:0;
  background:var(--bg-1);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:0;
  overflow-y:auto;overflow-x:hidden;
}
.rail::-webkit-scrollbar{display:none;}
.rail-item{
  width:48px;height:48px;
  border-radius:50%;
  background:var(--bg-3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:border-radius .15s cubic-bezier(.2,.6,.5,1),background .15s;
  position:relative;font-size:12px;font-weight:700;
  color:var(--text-muted);
  border:none;outline:none;overflow:hidden;
  margin-bottom:8px;
}
.rail-item img{width:100%;height:100%;object-fit:cover;}
.rail-item:hover,.rail-item.active{border-radius:16px;color:white;}
.rail-item.active{background:var(--blurple);}
.rail-item:hover:not(.active){background:var(--blurple);}
/* pip */
.rail-item::after{
  content:'';
  position:absolute;left:-4px;
  width:4px;height:0;
  background:white;border-radius:0 4px 4px 0;
  transition:height .2s,top .2s,transform .2s;
  top:50%;transform:translateY(-50%);
}
.rail-item:hover::after{height:20px;}
.rail-item.active::after{height:44px;}
.rail-home{font-size:22px;font-weight:800;letter-spacing:-1px;background:var(--blurple)!important;color:white!important;border-radius:50%!important;text-decoration:none;}
.rail-home:hover{border-radius:16px!important;}
.rail-sep{width:32px;height:1px;background:rgba(255,255,255,.08);margin:4px 0 12px;flex-shrink:0;}

/* ══ CHANNEL SIDEBAR ══ */
.sidebar{
  width:var(--side-w);flex-shrink:0;
  background:var(--bg-2);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* Server name header */
.srv-header{
  height:48px;padding:0 16px;
  display:flex;align-items:center;
  font-size:15px;font-weight:700;color:var(--text);
  border-bottom:1px solid var(--border);
  flex-shrink:0;cursor:pointer;
  transition:background .1s;
  gap:auto;
}
.srv-header:hover{background:var(--bg-hover);}
.srv-header-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Channels */
.ch-list{flex:1;overflow-y:auto;padding:8px 8px 0;}
.ch-section-header{
  display:flex;align-items:center;gap:4px;
  padding:16px 2px 4px;
  font-size:11px;font-weight:600;
  letter-spacing:.02em;text-transform:uppercase;
  color:var(--text-muted);cursor:pointer;
  transition:color .1s;
}
.ch-section-header:hover{color:var(--text);}
.ch-row{
  display:flex;align-items:center;gap:4px;
  padding:5px 8px;border-radius:4px;
  cursor:pointer;
  color:var(--text-muted);
  font-size:15px;font-weight:500;
  transition:background .1s,color .1s;
  position:relative;
  user-select:none;
}
.ch-row:hover{background:var(--bg-hover);color:#C4C9CE;}
.ch-row.active{background:var(--bg-4);color:var(--text);}
.ch-hash{
  font-size:18px;color:var(--text-dim);flex-shrink:0;
  width:20px;text-align:center;line-height:1;
  transition:color .1s;
}
.ch-row:hover .ch-hash,.ch-row.active .ch-hash{color:var(--text-muted);}
.ch-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px;}
.ch-badge{
  background:var(--bg-1);color:var(--text);
  font-size:11px;font-weight:700;
  padding:1px 6px;border-radius:8px;
  min-width:18px;text-align:center;
  flex-shrink:0;
}

/* Bot bar */
.bot-bar{
  height:52px;background:#232428;
  display:flex;align-items:center;
  padding:0 8px;gap:8px;flex-shrink:0;
}
.bot-av-wrap{position:relative;flex-shrink:0;}
.bot-av{
  width:32px;height:32px;border-radius:50%;
  background:var(--blurple);
  overflow:hidden;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;
  color:white;cursor:pointer;
}
.bot-av img{width:100%;height:100%;object-fit:cover;}
.bot-av-status{
  position:absolute;bottom:-1px;right:-1px;
  width:12px;height:12px;border-radius:50%;
  background:var(--green);
  border:2.5px solid #232428;
}
.bot-name-wrap{flex:1;overflow:hidden;cursor:pointer;}
.bot-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.bot-disc{font-size:11px;color:var(--text-muted);line-height:1.2;}
.icon-btn{
  width:32px;height:32px;border-radius:4px;
  background:none;border:none;
  color:var(--text-muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,color .1s;
  flex-shrink:0;
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text);}
.icon-btn svg{width:18px;height:18px;fill:currentColor;}

/* ══ MAIN ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-3);}

/* Top bar */
.topbar{
  height:48px;padding:0 16px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg-3);
}
.topbar-hash{color:var(--text-muted);font-size:20px;font-weight:900;flex-shrink:0;line-height:1;}
.topbar-name{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;}
.topbar-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
.topbar-topic{font-size:14px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

/* Hamburger for mobile */
.hamburger{
  display:none;background:none;border:none;
  color:var(--text-muted);cursor:pointer;
  padding:4px;flex-shrink:0;
}
.hamburger svg{width:24px;height:24px;}
@media(max-width:768px){.hamburger{display:flex;align-items:center;}}
@media(max-width:768px){.topbar-topic{display:none;}}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:0 0 8px;display:flex;flex-direction:column;}
.ch-intro{padding:40px 16px 16px;border-bottom:1px solid var(--border);margin-bottom:4px;flex-shrink:0;}
.ch-intro-icon{
  width:64px;height:64px;border-radius:50%;
  background:var(--bg-4);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}
.ch-intro-icon svg{width:34px;height:34px;fill:var(--text-muted);}
.ch-intro-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px;}
.ch-intro-sub{font-size:14px;color:var(--text-muted);line-height:1.5;}

/* message rows */
.msg{
  padding:2px 16px;
  display:flex;gap:16px;
  position:relative;
}
.msg:hover{background:rgba(0,0,0,.06);}
.msg-av{
  width:40px;height:40px;border-radius:50%;
  flex-shrink:0;margin-top:1px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:white;
}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-right{flex:1;min-width:0;padding-top:1px;}
.msg-head{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
.msg-author{font-size:15px;font-weight:600;cursor:pointer;line-height:1;}
.msg-author:hover{text-decoration:underline;}
.bot-tag{
  display:inline-block;
  background:var(--blurple);color:white;
  font-size:9px;font-weight:700;letter-spacing:.04em;
  padding:2px 4px;border-radius:3px;
  margin-left:2px;vertical-align:middle;
  line-height:1.4;
}
.msg-time{font-size:11px;color:var(--text-muted);line-height:1;}
.msg-content{font-size:15px;color:var(--text);line-height:1.375;word-break:break-word;}
.msg-content strong{font-weight:700;}
.msg-content code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;font-size:85%;font-family:monospace;}
.msg-content .mention{background:rgba(88,101,242,.3);color:#c9cdfb;border-radius:3px;padding:0 3px;font-weight:500;}

/* Compact follow-on */
.msg-follow{
  padding:1px 16px;
  display:flex;gap:16px;position:relative;
}
.msg-follow:hover{background:rgba(0,0,0,.06);}
.msg-follow-ts{
  width:40px;flex-shrink:0;
  font-size:10px;color:transparent;
  text-align:right;padding-top:3px;
  transition:color .1s;white-space:nowrap;
  padding-right:0;
}
.msg-follow:hover .msg-follow-ts{color:var(--text-muted);}
.msg-follow .msg-content{flex:1;}

/* Embed */
.embed{
  display:inline-block;
  max-width:min(520px,100%);
  background:#2B2D31;
  border-radius:4px;
  border-left:4px solid var(--blurple);
  padding:10px 14px 10px 12px;
  margin-top:4px;
}
.embed-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3;}
.embed-desc{font-size:14px;color:#B5BAC1;line-height:1.6;white-space:pre-line;}
.embed-desc strong{color:var(--text);font-weight:600;}
.embed-desc code{background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px;font-size:85%;font-family:monospace;}

/* Input */
.input-area{padding:0 16px 24px;flex-shrink:0;}
.input-box{
  background:var(--bg-4);
  border-radius:8px;
  display:flex;align-items:center;
  padding:0 12px;
}
.input-icon{
  width:36px;height:44px;background:none;border:none;
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .15s;
}
.input-icon:hover{color:var(--text);}
.input-icon svg{width:20px;height:20px;fill:currentColor;}
.the-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:inherit;font-size:15px;
  padding:11px 8px;caret-color:white;
}
.the-input::placeholder{color:var(--text-muted);}

/* ══ MEMBER SIDEBAR ══ */
.members{
  width:var(--side-w);flex-shrink:0;
  background:var(--bg-2);
  overflow-y:auto;
  padding:8px 8px;
}
@media(max-width:1080px){.members{display:none;}}
.member-section{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);padding:16px 8px 4px;}
.member-row{
  display:flex;align-items:center;gap:10px;
  padding:5px 8px;border-radius:4px;cursor:pointer;
  transition:background .1s;margin-bottom:1px;
}
.member-row:hover{background:var(--bg-hover);}
.member-row:hover .member-label{color:var(--text);}
.m-av{
  width:32px;height:32px;border-radius:50%;
  flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:white;
  position:relative;
}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-dot{
  position:absolute;bottom:-1px;right:-1px;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--bg-2);
}
.member-label{font-size:14px;font-weight:500;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .1s;}

/* ══ EMPTY / LOADING ══ */
.center-view{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:var(--text-muted);padding:32px;text-align:center;
}
.spin{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--bg-4);
  border-top-color:var(--blurple);
  animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg);}}
.center-title{font-size:17px;font-weight:700;color:var(--text-muted);}
.center-sub{font-size:14px;color:var(--text-dim);max-width:280px;line-height:1.5;}

/* ══ MOBILE OVERLAY ══ */
.overlay{
  display:none;position:fixed;inset:0;z-index:90;
  background:rgba(0,0,0,.7);
}
.overlay.show{display:block;}

/* Mobile sidebar slide */
@media(max-width:768px){
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:100;
    transform:translateX(calc(-100% - var(--rail-w)));
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 24px rgba(0,0,0,.5);
    margin-left:var(--rail-w);
  }
  .sidebar.open{transform:translateX(0);}
  :root{--rail-w:0px;}
  .rail{display:none;}
  .main{width:100vw;}
}
</style>
</head>
<body>

        </button>
      </div>
    </div>
  </div>

  <!-- Members -->
  <div class="members" id="members"></div>

</div>

<script>

  g3:[

/* ── utils ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){return n.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function fmtTs(ts){
  const d=new Date(ts),now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  const time=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(d>=today) return 'Today at '+time;
  if(d>=yest)  return 'Yesterday at '+time;
  return d.toLocaleDateString([],{month:'short',day:'numeric'})+' at '+time;
}
function fmtShort(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}


/* ── live discord bootstrap (through local backend) ── */
async function api(path,options={}){
  const res=await fetch(API+path,options);
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'API failed');
  return data;
}

async function hydrateFromDiscord(){
  try{
    const status=await api('/session/status');
    if(!status.active) throw new Error('No local session');
    if(status.profile){
      BOT.username=status.profile.username||BOT.username;
      BOT.id=status.profile.id||BOT.id;
      BOT.avatar_url=status.profile.avatar_url||'';
    }

    const guildData=await api('/guilds');
    const guilds=guildData.guilds;
    if(Array.isArray(guilds)&&guilds.length){
      GUILDS.length=0;
      guilds.slice(0,20).forEach((g,idx)=>{
        const name=g.name||`Server ${idx+1}`;
        GUILDS.push({id:g.id,name,abbr:name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()||'SV',color:['#5865F2','#23A559','#FEE75C','#ED4245','#FF73FA'][idx%5]});
      });
      for(const g of GUILDS){
        try{
          const channelData=await api(`/guilds/${g.id}/channels`);
          const channels=channelData.channels;
          if(Array.isArray(channels)){
            CHANNELS[g.id]=channels.filter(c=>[0,2,4,5].includes(c.type)).slice(0,40).map(c=>({id:c.id,name:c.name||'unnamed',type:c.type,pid:c.parent_id||undefined,topic:c.topic||''}));
          }
        }catch(_){ }
      }
    }
  }catch(_){
    // fallback to mock data
  }

  document.getElementById('botName').textContent=BOT.username;
  const av=document.getElementById('botAv');
  if(BOT.avatar_url){
    av.innerHTML=`<img src="${BOT.avatar_url}" alt="bot avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
  }else{
    av.textContent=ini(BOT.username);
  }
}

/* ── channels ── */
function renderChannels(g){
  const list=document.getElementById('chList');
  list.innerHTML='';
  const chs=CHANNELS[g.id]||[];
  const cats=chs.filter(c=>c.type===4);
  const noCat=chs.filter(c=>c.type!==4&&!c.pid);

  function mkRow(ch){
    if(ch.type===4)return;
    const icon=ch.type===2?
      `<svg style="width:18px;height:18px;fill:currentColor;flex-shrink:0;opacity:.6;" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`:
      `<svg style="width:16px;height:16px;fill:currentColor;flex-shrink:0;opacity:.6;" viewBox="0 0 24 24"><path d="M10.99 3H7.99L5.99 7H2v2h3L7.74 19H16.26L19 9h3V7h-4L16.01 3H13v4h-2V3z" opacity="0"/><path d="M5.88 19h12.24L20 9H4l1.88 10zM10 11h4v2h-4v-2z" opacity="0"/><text x="2" y="18" font-family="sans-serif" font-weight="900" font-size="14" fill="currentColor">#</text></svg>`;

    const badge=ch.badge?`<span class="ch-badge">${ch.badge}</span>`:'';
    const el=document.createElement('div');
    el.className='ch-row';
    el.dataset.id=ch.id;
    el.innerHTML=`${icon}<span class="ch-label">${esc(ch.name)}</span>${badge}`;
    el.addEventListener('click',()=>{selectChannel(ch);closeSidebar();});
    list.appendChild(el);
  }

  noCat.forEach(mkRow);
  cats.forEach(cat=>{
    const hdr=document.createElement('div');
    hdr.className='ch-section-header';
    hdr.innerHTML=`<svg style="width:10px;height:10px;fill:currentColor;" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>${esc(cat.name)}`;
    list.appendChild(hdr);
    chs.filter(c=>c.pid===cat.id&&c.type!==4).forEach(mkRow);
  });
}

/* ── select channel ── */
async function selectChannel(ch){
  activeChannel=ch;
  document.querySelectorAll('.ch-row').forEach(el=>el.classList.toggle('active',el.dataset.id===ch.id));
  // clear badge
  const row=document.querySelector(`.ch-row[data-id="${ch.id}"]`);
  if(row){const b=row.querySelector('.ch-badge');if(b)b.remove();}

  document.getElementById('topName').textContent=ch.name;
  document.getElementById('topTopic').textContent=ch.topic||'';
  document.getElementById('topIcon').textContent=ch.type===2?'🔊':'#';
  document.getElementById('msgInput').placeholder=`Message #${ch.name}`;

  if(ch.type===2){
    document.getElementById('messages').innerHTML=`
      <div class="center-view">
        <div style="font-size:48px;margin-bottom:4px;">🔊</div>
        <div class="center-title">Voice Channel</div>
        <div class="center-sub">This is a voice channel — your bot can join it programmatically.</div>
      </div>`;
    return;
  }

  document.getElementById('messages').innerHTML=`<div class="center-view"><div class="spin"></div></div>`;
  await sleep(220);
  renderMessages(ch);
}

/* ── messages ── */
function renderMessages(ch){
  const msgs=MESSAGES[ch.id]||[];
  const area=document.getElementById('messages');
  area.innerHTML='';

  // Intro
  const intro=document.createElement('div');
  intro.className='ch-intro';
  intro.innerHTML=`
    <div class="ch-intro-icon">
      <svg viewBox="0 0 24 24"><text x="2" y="20" font-family="sans-serif" font-weight="900" font-size="22">#</text></svg>
    </div>
    <div class="ch-intro-title">#${esc(ch.name)}</div>
    <div class="ch-intro-sub">${esc(ch.topic||'This is the start of #'+ch.name+'.')}</div>
  `;
  area.appendChild(intro);

  if(!msgs.length){
    const empty=document.createElement('div');
    empty.className='center-view';
    empty.style.flex='1';
    empty.innerHTML=`<div class="center-title" style="font-size:15px;">No messages yet.</div>`;
    area.appendChild(empty);
    return;
  }

  let lastA=null,lastTs=null;
  msgs.forEach(msg=>{
    const same=lastA===msg.a.n;
    const close=lastTs&&(msg.ts-lastTs)<300000;

    if(same&&close){
      const row=document.createElement('div');
      row.className='msg-follow';
      row.innerHTML=`<span class="msg-follow-ts">${fmtShort(msg.ts)}</span><div class="msg-content">${fmt(msg)}</div>`;
      area.appendChild(row);
    } else {
      const row=document.createElement('div');
      row.className='msg';
      const botBadge=msg.a.bot?`<span class="bot-tag">BOT</span>`:'';
      row.innerHTML=`
        <div class="msg-av" style="background:${msg.a.c}22;color:${msg.a.c};">${msg.a.bot?'🤖':ini(msg.a.n)}</div>
        <div class="msg-right">
          <div class="msg-head">
            <span class="msg-author" style="color:${msg.a.c};">${esc(msg.a.n)}${botBadge}</span>
            <span class="msg-time">${fmtTs(msg.ts)}</span>
          </div>
          <div class="msg-content">${fmt(msg)}</div>
        </div>
      `;
      area.appendChild(row);
    }

    lastA=msg.a.n;lastTs=msg.ts;
  });

  area.scrollTop=999999;
}

function fmt(msg){
  let c=esc(msg.content||'');
  c=c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  c=c.replace(/`(.+?)`/g,'<code>$1</code>');
  c=c.replace(/@(\w+)/g,'<span class="mention">@$1</span>');

  if(msg.embed){
    const hex='#'+(msg.embed.color||0x5865F2).toString(16).padStart(6,'0');
    const d=(msg.embed.desc||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/`(.+?)`/g,'<code>$1</code>')
      .replace(/\n/g,'<br/>');
    c+=`<div class="embed" style="border-left-color:${hex};">
      <div class="embed-title">${esc(msg.embed.title||'')}</div>
      <div class="embed-desc">${d}</div>
    </div>`;
  }
  return c||'<span style="color:var(--text-muted);font-style:italic;">(no content)</span>';
}

/* ── members ── */
function renderMembers(g){
  const sidebar=document.getElementById('members');
  const list=MEMBERS[g.id]||[];
  sidebar.innerHTML='';
  if(!list.length){sidebar.innerHTML='<div style="padding:20px 8px;font-size:13px;color:var(--text-muted);">No members</div>';return;}

  const online=list.filter(m=>m.status!=='offline');
  const offline=list.filter(m=>m.status==='offline');

  function mk(m){
    const el=document.createElement('div');
    el.className='member-row';
    const sc=STATUS[m.status]||STATUS.offline;
    el.innerHTML=`
      <div class="m-av" style="background:${m.c}22;color:${m.c};">
        ${m.bot?'🤖':ini(m.n)}
        <div class="m-dot" style="background:${sc};"></div>
      </div>
      <div class="member-label" style="${m.status==='offline'?'opacity:.38;':''}">${esc(m.n)}${m.bot?' <span style="font-size:10px;background:#5865F2;color:#fff;padding:1px 4px;border-radius:3px;font-weight:700;vertical-align:middle;">BOT</span>':''}</div>
    `;
    sidebar.appendChild(el);
  }

  if(online.length){
    const s=document.createElement('div');s.className='member-section';s.textContent=`ONLINE — ${online.length}`;sidebar.appendChild(s);
    online.forEach(mk);
  }
  if(offline.length){
    const s=document.createElement('div');s.className='member-section';s.textContent=`OFFLINE — ${offline.length}`;sidebar.appendChild(s);
    offline.forEach(mk);
  }
}

/* ── send message ── */
document.getElementById('msgInput').addEventListener('keydown',async e=>{
  if(e.key!=='Enter'||e.shiftKey)return;
  const val=e.target.value.trim();if(!val||!activeChannel||activeChannel.type!==0)return;
  e.target.value='';

  if(!MESSAGES[activeChannel.id])MESSAGES[activeChannel.id]=[];
  MESSAGES[activeChannel.id].push({id:'s'+Date.now(),a:{n:BOT.username,c:'#5865F2',bot:true},content:val,ts:Date.now()});

  if(val.startsWith('$ ')){
    try{
      const result=await api('/console/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:val.slice(2)})});
      MESSAGES[activeChannel.id].push({id:'r'+Date.now(),a:{n:BOT.username,c:'#5865F2',bot:true},embed:{color:result.exit_code===0?0x23A559:0xED4245,title:`💻 Console exit ${result.exit_code}`,desc:'```\n'+(result.output||'(no output)')+'\n```'},ts:Date.now()});
    }catch(err){
      MESSAGES[activeChannel.id].push({id:'r'+Date.now(),a:{n:'System',c:'#ED4245'},content:'Console error: '+(err.message||'failed'),ts:Date.now()});
    }
  }else{
    try{
      await api('/messages/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({channel_id:activeChannel.id,content:val})});
    }catch(err){
      MESSAGES[activeChannel.id].push({id:'r'+Date.now(),a:{n:'System',c:'#ED4245'},content:'Send failed: '+(err.message||'unknown error'),ts:Date.now()});
    }
  }

  renderMessages(activeChannel);
  document.getElementById('messages').scrollTop=999999;
});

function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
