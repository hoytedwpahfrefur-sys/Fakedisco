<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terminal Browser Demo</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#f5f5f5; margin:0; padding:24px; }
    .card { background:#1f2937; border-radius:12px; padding:16px; }
    code { color:#93c5fd; }
  </style>
</head>
<body>
  <h1>It works 🎉</h1>
  <div class="card">
    <p>This page is loaded from <code>app/src/main/assets/www/index.html</code>.</p>
    <p>Try commands in the terminal area:</p>
    <ul>
      <li><code>ls</code></li>
      <li><code>cat index.html</code></li>
      <li><code>run index.html</code> or <code>rum index.html</code></li>
    </ul>
  </div>
</body>
</html>
